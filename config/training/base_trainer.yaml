# training config: epochs, batch_size, lr, scheduler...
output_dir: "outputs/checkpoints"
result_dir: "outputs/results"
num_train_epochs: 3
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
# float <1 = ratio of total steps; int >=1 = absolute steps (warmup_ratio deprecated)
warmup_steps: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
bf16: true
fp16: false
eval_strategy: "steps"
eval_steps: 200
save_strategy: "steps"
save_steps: 200
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
logging_steps: 10
dataloader_num_workers: 4
dataloader_pin_memory: true
seed: 42
report_to: "none"
run_name: "coin-vlm"
max_seq_length: 2048
early_stopping_patience:
  enabled: true
  patience: 3
  threshold: 0.0