output_dir: "outputs/checkpoints"
result_dir: "outputs/results"
 
# Core hyperparams
num_train_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
 
# Precision
bf16: true
fp16: false
 
# Eval & save
eval_strategy: "steps"
eval_steps: 100
save_strategy: "steps"
save_steps: 100
save_total_limit: 3
load_best_model_at_end: true
# Pick checkpoint by mint_mark accuracy (generation-based), not eval_loss.
# Requires generation_eval.enabled=true below so the metric is actually computed.
metric_for_best_model: "mint_mark_accuracy"
greater_is_better: true

# Generation-based eval during training. Produces `eval_mint_mark_accuracy`,
# `eval_year_accuracy`, `eval_extract_match` so the Trainer can pick the best
# checkpoint by a task metric instead of eval_loss.
generation_eval:
  enabled: true
  max_samples: 256
 
# Logging
logging_steps: 10
report_to: "wandb"
run_name: "coin-vlm"
max_seq_length: 2048
 
# DataLoader
dataloader_num_workers: 4
dataloader_pin_memory: true
 
# Seed
seed: 42
deterministic: false
 
early_stopping_patience:
  enabled: true
  patience: 5
  threshold: 0.001