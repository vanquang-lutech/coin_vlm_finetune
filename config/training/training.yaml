output_dir: "outputs/checkpoints"
result_dir: "outputs/results"
 
# Core hyperparams
num_train_epochs: 10
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
 
# Precision
bf16: true
fp16: false
 
# Eval & save
eval_strategy: "steps"
eval_steps: 200
save_strategy: "steps"
save_steps: 200
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
 
# Logging
logging_steps: 10
report_to: "none"
run_name: "coin-vlm"
max_seq_length: 2048
 
# DataLoader
dataloader_num_workers: 4
dataloader_pin_memory: true
 
# Seed
seed: 42
 
early_stopping_patience:
  enabled: true
  patience: 3
  threshold: 0.0