output_dir: "outputs/checkpoints"
result_dir: "outputs/results"
 
# Core hyperparams
num_train_epochs: 5
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
lr_scheduler_type: "cosine"
# transformers>=5.x: warmup_steps accepts a float <1 as a *ratio* of total
# steps (ceil(total_steps * value)) or an int >=1 as an absolute step count.
# 0.03 == old warmup_ratio behaviour. warmup_ratio is deprecated.
warmup_steps: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
 
# Precision
bf16: true
fp16: false
 
# Eval & save
eval_strategy: "steps"
eval_steps: 100
save_strategy: "steps"
save_steps: 100
save_total_limit: 2  # with load_best_model_at_end=true: keeps best + last checkpoint
load_best_model_at_end: true
# Pick checkpoint by extract_match (both year AND mint_mark correct).
# This is the production-aligned metric — eval_loss is dominated by JSON
# structural tokens (`{`, `"`, `:`...) so it can drop while real accuracy
# stagnates. Targeting only mint_mark_accuracy risks the model trading year
# quality for mint quality. extract_match catches regression in either field.
# Requires generation_eval.enabled=true below so the metric is actually computed.
metric_for_best_model: "extract_match"
greater_is_better: true

# Generation-based eval during training. Produces `eval_mint_mark_accuracy`,
# `eval_year_accuracy`, `eval_extract_match` so the Trainer can pick the best
# checkpoint by a task metric instead of eval_loss.
generation_eval:
  enabled: true
  # Larger subsample reduces boolean-metric noise. ~512 samples gives
  # ~±2% sampling error on extract_match — small enough that early stopping
  # threshold of 0.005 is meaningful. Trade-off: each eval step is ~2x slower
  # than 256 samples.
  max_samples: 512
 
# Logging
logging_steps: 10
# Hybrid tracking: W&B (live monitoring) + MLflow (registry/lineage record).
# transformers attaches WandbCallback + MLflowCallback for these. Use ["none"]
# (or "none") in CI / smoke tests. MLflow needs mlflow-skinny + MLFLOW_* env.
report_to: ["wandb", "mlflow"]
run_name: "coin-vlm"
# MLflow experiment (overridable via MLFLOW_EXPERIMENT_NAME env).
mlflow_experiment: "coin-vlm-finetune"
# Log the best checkpoint to the MLflow run as a 'model/' artifact at train end,
# so it shows in the UI and can be registered via the "Register Model" button
# (manual, gate-free — complements `make register` which applies the quality
# gate). Set false to skip the upload (e.g. very large full-finetune weights).
mlflow_log_model: true
max_seq_length: 2560
 
# DataLoader
dataloader_num_workers: 4
dataloader_pin_memory: true
 
# Seed
seed: 42
deterministic: false
 
early_stopping_patience:
  enabled: true
  # HF EarlyStopping: counter resets only if `new > best + threshold`.
  # Real per-eval improvement in mid-training is typically 0.003–0.01 on
  # extract_match — setting threshold to 0.005 ate most of that budget and
  # stopped training inside the first epoch.
  #
  # threshold=0.0 means ANY strict improvement keeps training alive. Sampling
  # noise on 512 samples (~±2pp) is absorbed by the larger patience window:
  # we need `patience` *consecutive* no-improvement evals, so a few unlucky
  # eval ticks won't kill the run.
  patience: 10        # 10 evals * 100 steps = 1000 steps tolerance ~= 1 epoch
  threshold: 0.0