output_dir: "outputs/checkpoints"
result_dir: "outputs/results"
 
# Core hyperparams
num_train_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
 
# Precision
bf16: true
fp16: false
 
# Eval & save
eval_strategy: "steps"
eval_steps: 100
save_strategy: "steps"
save_steps: 100
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
 
# Logging
logging_steps: 10
report_to: "wandb"
run_name: "coin-vlm"
max_seq_length: 2048
 
# DataLoader
dataloader_num_workers: 4
dataloader_pin_memory: true
 
# Seed
seed: 42
# Bit-exact reproducibility (cudnn.deterministic=True, benchmark=False).
# Costs ~10-30% throughput on vision; leave false unless debugging
# divergence/reproducing a paper number.
deterministic: false
 
early_stopping_patience:
  enabled: true
  patience: 5
  threshold: 0.001