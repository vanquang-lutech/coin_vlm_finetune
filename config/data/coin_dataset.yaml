hf_dataset_name: "BrownAtLutech/coin_mintMark_year_detection"
cache_dir: null
annotations_path: "data/annotations/labels.json"
image_dir: "data/processed"
output_dir: "data/splits"
train_ratio: 0.8
val_ratio: 0.1
test_ratio: 0.1
stratify_by: ["year", "mint_mark"]
seed: 42
min_samples_per_class: 3
enhancer_config_path: null

# Mint-mark class rebalancing (applied to the TRAIN split only).
# Original distribution in train: null=8969, D=3271, P=1183, S=295, Mo=91, O=43, W=27, CC=10.
# Without rebalancing, model collapses to "predict null when in doubt".
#
# Strategies:
#   none                 -> no resampling (use raw distribution)
#   downsample_majority  -> cap the null class at `null_class_cap`
#   oversample_minority  -> duplicate each non-null class up to `target_per_class`
#   balanced             -> both: null capped, minorities oversampled to target
#
# Current setting: cut null in half (~4485), keep all other classes untouched.
# This halves the null share from 64.6% to ~46% without touching the rare
# minority classes (which only have 10–295 raw samples and would suffer from
# either oversampling collapse or untouched imbalance).
class_balance:
  strategy: "downsample_majority"
  # Cap null at ~1/3 of its raw count (8969 → 3000), making D the new
  # majority. null share drops from 64.6% to ~33%, on par with D.
  null_class_cap: 3000
  # Not used by downsample_majority; kept here for documentation only.
  target_per_class: null