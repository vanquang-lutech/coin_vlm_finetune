model:
  backend: "unsloth"
  # Unsloth: do NOT QLoRA (4-bit) Qwen3.5 — quantization error is too high. Use
  # bf16 LoRA. load_in_16bit is forwarded to FastVisionModel.from_pretrained by
  # the unsloth loader (only when present, so 4-bit configs are unaffected).
  load_in_4bit: false
  load_in_16bit: true

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    # Finetune BOTH the vision encoder AND the full language stack. "all-linear"
    # is the robust choice for Qwen3.5's 3:1 HYBRID stack (~75% Gated DeltaNet
    # linear-attention layers, attached as `layers.N.linear_attn`): Unsloth's
    # get_peft_regex discovers adapters by STRUCTURE (every nn.Linear whose path
    # carries a tower tag + an attn/mlp tag; "linear_attn" contains "attn"), so
    # it adapts the DeltaNet projections regardless of their exact names — which
    # DIFFER by build: native transformers 5.5.0 uses the UNMERGED names
    # in_proj_qkv / in_proj_z / in_proj_b / in_proj_a (+ out_proj), while some
    # trust_remote_code builds use MERGED in_proj_qkvz / in_proj_ba. An explicit
    # list is fragile to exactly this; all-linear is not, and it also covers the
    # vision tower (qkv/proj/linear_fc1/fc2) that a q/k/v/o_proj list misses.
    # finetune_* flags drive selection (only with "all-linear").
    #
    # VERIFY on the first run via the "[LoRA coverage]" log line that vision
    # adapters > 0 AND the DeltaNet in_proj_* names appear under language.
    target_modules: "all-linear"
    finetune_vision_layers: true
    finetune_language_layers: true
    finetune_attention_modules: true
    finetune_mlp_modules: true
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"
