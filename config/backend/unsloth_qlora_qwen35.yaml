model:
  backend: "unsloth"
  # Unsloth: do NOT QLoRA (4-bit) Qwen3.5 — quantization error is too high. Use
  # bf16 LoRA. load_in_16bit is forwarded to FastVisionModel.from_pretrained by
  # the unsloth loader (only when present, so 4-bit configs are unaffected).
  load_in_4bit: false
  load_in_16bit: true

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    # Qwen3.5 (dense) uses a 3:1 HYBRID stack: 3 Gated DeltaNet (linear-attention)
    # layers for every 1 full-attention layer, so ~75% of layers are DeltaNet.
    # The standard q/k/v/o_proj names ONLY exist on the ~25% full-attention
    # layers; the DeltaNet layers expose MERGED projections under different
    # names. Verified against the HF transformers Qwen3_5 model doc + Unsloth
    # Qwen3.5 fine-tune guide:
    #   in_proj_qkvz -> merged Q,K,V,Z (Z = output gate)
    #   in_proj_ba   -> merged beta, alpha gates
    #   out_proj     -> DeltaNet output projection
    # NOTE: they are merged — there is NO in_proj_qkv / in_proj_z / in_proj_b /
    # in_proj_a. Without in_proj_qkvz + in_proj_ba + out_proj, LoRA leaves the
    # dominant ~75% token-mixing layers frozen and undertrains the model.
    target_modules:
      # Full-attention layers (~25%).
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      # MLP / FFN (all layers).
      - "gate_proj"
      - "up_proj"
      - "down_proj"
      # Gated DeltaNet linear-attention (~75% of layers).
      - "in_proj_qkvz"
      - "in_proj_ba"
      - "out_proj"
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"
