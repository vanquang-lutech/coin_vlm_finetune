# Unsloth QLoRA backend for InternVL3-8B. Use with config/model/intern_vl3_8b.yaml.
#
# EXPERIMENTAL: InternVL3 is not officially supported by Unsloth's
# FastVisionModel (unslothai/unsloth#2341, #3401). Loading relies on the
# auto_model=AutoModel workaround in the model config and is known to be flaky.
model:
  backend: "unsloth"
  load_in_4bit: true   # QLoRA — InternViT + Qwen2.5-7B fits more comfortably in 4-bit

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    bias: "none"
    use_gradient_checkpointing: true

    # No explicit `target_modules`: Unsloth auto-selects the linear layers per
    # the finetune_* flags below. InternVL's vision (InternViT) and projector
    # (`mlp1`) module names differ from Qwen's, so the Qwen target lists used in
    # the other unsloth backend configs do NOT apply here — listing them would
    # raise "target modules not found". The loader omits the kwarg when
    # target_modules is unset (src/model/unsloth_loader.py).
    finetune_vision_layers: true
    finetune_language_layers: true
    finetune_attention_modules: true
    finetune_mlp_modules: true

training:
  backend: "unsloth"
