model:
  backend: "unsloth"

  # bf16 LoRA (no 4-bit quantization). Qwen3.5 docs recommend NOT finetuning in 4-bit.
  load_in_4bit: false

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    target_modules:
      # Full-attention layers (minority in Qwen3.5) + standard for Qwen3-VL.
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      # MLP (all layers).
      - "gate_proj"
      - "up_proj"
      - "down_proj"
      # Qwen3.5 GatedDeltaNet linear-attention projections — the MAJORITY of
      # layers in the hybrid stack. Without these, LoRA only touches the few
      # full-attention layers + MLP and leaves the dominant token-mixing layers
      # frozen, which undertrains the model. Harmless for Qwen3-VL (no match).
      - "in_proj_qkv"
      - "in_proj_z"
      - "in_proj_b"
      - "in_proj_a"
      - "out_proj"
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"
