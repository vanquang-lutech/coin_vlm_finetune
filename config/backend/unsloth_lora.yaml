model:
  backend: "unsloth"

  # bf16 LoRA (no 4-bit quantization). Qwen3.5 docs recommend NOT finetuning in 4-bit.
  load_in_4bit: false

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"
