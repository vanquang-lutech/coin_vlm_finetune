model:
  backend: "unsloth"

  # bf16 LoRA (no 4-bit quantization). Qwen3.5 docs recommend NOT finetuning in 4-bit.
  load_in_4bit: false

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    # Finetune vision encoder + full language stack for BOTH Qwen3-VL and
    # Qwen3.5. "all-linear" discovers adapters by STRUCTURE (every nn.Linear in
    # a tower, attn+mlp), so it covers the vision tower AND Qwen3.5's Gated
    # DeltaNet projections (layers.N.linear_attn.*) without hand-listing names —
    # which is fragile because DeltaNet names differ by build (native
    # transformers 5.5.0: in_proj_qkv/z/b/a; some remote-code builds: merged
    # in_proj_qkvz/in_proj_ba). The finetune_* flags drive selection (only with
    # "all-linear"). Check the "[LoRA coverage]" log on the first run.
    target_modules: "all-linear"
    finetune_vision_layers: true
    finetune_language_layers: true
    finetune_attention_modules: true
    finetune_mlp_modules: true
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"
