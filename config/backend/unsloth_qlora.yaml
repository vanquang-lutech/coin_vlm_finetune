model:
  backend: "unsloth"

  # Model name is chosen in model config; set model.unsloth_name to an Unsloth repo.
  load_in_4bit: true

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    # VISION-ONLY finetuning: adapt the vision tower (+ merger), FREEZE the
    # language model. "all-linear" lets Unsloth's get_peft_regex discover every
    # Linear in the vision encoder (attn qkv/proj, vision MLP, patch-merger) —
    # names an explicit q_proj/... list would MISS. The finetune_* flags drive
    # the selection (they ONLY take effect with "all-linear").
    #
    # Why freeze the LM: training broadly over the LM (finetune_language_layers
    # =true) overfits it to the fixed training prompt and erodes the base
    # model's instruction-following — it then echoes the eval prompt's JSON
    # skeleton instead of answering. Freezing the LM keeps Qwen3-VL-Instruct's
    # formatting/instruction-following intact, while gradient still flows THROUGH
    # the frozen LM into the vision adapters (so vision is optimized end-to-end
    # to read the coin). Verify with the "[LoRA coverage]" log line:
    # expect vision adapters>0 and language adapters=0.
    target_modules: "all-linear"
    finetune_vision_layers: true
    finetune_language_layers: false
    finetune_attention_modules: true
    finetune_mlp_modules: true
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"