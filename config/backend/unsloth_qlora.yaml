model:
  backend: "unsloth"

  # Model name is chosen in model config; set model.unsloth_name to an Unsloth repo.
  load_in_4bit: true

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
    use_gradient_checkpointing: true

training:
  backend: "unsloth"