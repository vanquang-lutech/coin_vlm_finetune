# FastAPI + vLLM serving config.
#
# Points at a MERGED (+ optionally AWQ-quantized) checkpoint produced by
# scripts/export.py. The prompt and generation defaults are still taken from
# config/inference/inference.yaml (merged by ConfigLoader), so the served model
# behaves identically to scripts/inference.py.
serving:
  # Path to the standalone checkpoint vLLM should load. Use the AWQ output for a
  # quantized model, or the plain merged dir for full bf16.
  model_path: "/data/coin/coin_vlm_finetune/data/models/Qwen3-VL-8B-coin-awq"

  # Quantization method vLLM applies at load time.
  #   null  -> vLLM auto-detects from the checkpoint's config.json
  #            (quantization_config.quant_method). RECOMMENDED: the project's
  #            export_awq uses llmcompressor, which saves "compressed-tensors"
  #            (W4A16) — NOT classic AutoAWQ. Forcing "awq" would pick the wrong
  #            loader and fail.
  #   "compressed-tensors" -> force the llmcompressor format explicitly.
  #   "awq" -> only for an AutoAWQ-format export.
  quantization: null

  # vLLM engine args.
  dtype: "auto"                 # auto picks bf16/fp16 from the checkpoint
  max_model_len: 4096
  gpu_memory_utilization: 0.90
  max_num_seqs: 16              # max concurrent sequences batched by vLLM
  trust_remote_code: true
  limit_mm_per_prompt_image: 1  # exactly one coin image per request
  tensor_parallel_size: 1
  enforce_eager: false          # set true to disable CUDA graphs (lower VRAM, slower)
  seed: 42

  # Image preprocessing. The training dataset was enhanced with CLAHE + unsharp
  # mask (fixed params), so the API MUST apply the SAME enhancement to incoming
  # images to avoid a train/serve skew. These defaults match the dataset build.
  preprocess:
    enhance: true
    mode: "full"          # full = enhance every image (matches training); smart = only low-quality
    clahe_clip_limit: 2.0
    clahe_tile_size: [8, 8]
    unsharp_sigma: 2.0
    unsharp_amount: 1.5
    # smart-mode thresholds (ignored when mode: full)
    contrast_threshold: 50.0
    sharpness_threshold: 600.0

  # Request guards.
  max_upload_mb: 20        # reject uploads larger than this (before decode/enhance); 0 = no limit
  request_timeout_s: 60    # 504 if a single prediction exceeds this; 0 = no timeout

  # HTTP server. Shared multi-user box -> avoid the crowded default 8000.
  # Picked from the IANA dynamic/private range (49152-65535), which apps rarely
  # grab. Override per-run if needed: --override serving.port=49710
  host: "0.0.0.0"
  port: 49710

  # ngrok: expose the local port through a public URL so the API on the A100 box
  # is reachable from outside for testing. Uses the reserved (static) domain
  # below, so the URL stays stable across restarts.
  # Auth: a reserved domain REQUIRES an ngrok authtoken. Set it via the
  # NGROK_AUTHTOKEN env var (preferred) or `authtoken:` here.
  #   export NGROK_AUTHTOKEN=xxxxx
  ngrok:
    enabled: true
    domain: "embezzle-eastcoast-armoire.ngrok-free.dev"
    authtoken: null    # falls back to $NGROK_AUTHTOKEN
    # If the box can't reach bin.ngrok.com to auto-download, install the ngrok
    # binary manually and point to it here (or via $NGROK_PATH).
    binary_path: null  # e.g. /data/coin/coin_vlm_finetune/bin/ngrok

  # Logging. Files are date-partitioned under `log_dir` and roll over on a new
  # day/month automatically (log_rotation: daily | monthly). Layout for daily:
  #   {log_dir}/2026-05/serve-2026-05-29.log         — application/server logs
  #   {log_dir}/2026-05/predictions-2026-05-29.jsonl — one JSON line per request
  # monthly:
  #   {log_dir}/2026/serve-2026-05.log
  #   {log_dir}/2026/predictions-2026-05.jsonl
  # Set predictions_log: false to disable the per-request JSONL sink.
  log_dir: "outputs/logs/serving"
  log_rotation: "daily"
  predictions_log: true
