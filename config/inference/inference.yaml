generation:
  max_new_tokens: 128
  temperature: 0.1
  top_p: 1.0
  repetition_penalty: 1.0
  do_sample: false

preprocessing:
  max_image_size: 768
  
prompt:
  system: "You are a coin expert. Identify the year and mint mark from coin images."
  user: |
    Look at the coin image and extract:
    1. The year (4-digit number, or empty if none visible)
    2. The mint mark (single letter, e.g. P, D, S, W; or empty if none visible)

    Respond ONLY with valid JSON in this exact schema:
    {"year": "YYYY", "mint_mark": "X"}

    If no mint mark is visible, use an empty string: {"year": "YYYY", "mint_mark": ""}.