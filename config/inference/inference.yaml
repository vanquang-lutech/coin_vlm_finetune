generation:
  max_new_tokens: 128
  temperature: 0.1
  top_p: 1.0
  repetition_penalty: 1.0
  do_sample: false

# NOTE: this top-level processor block is the EFFECTIVE one for BOTH training
# and eval (loader + evaluator read config.processor before config.model.processor).
# Raised for fine detail (year digits / mint marks are tiny on the coin).
# max_pixels ~= number of vision tokens; keep training.max_seq_length above it
# (+ ~250 text tokens) or the processor truncates image tokens and Qwen raises a
# token-count mismatch. Keep config/model/qwen3_vl_8b.yaml processor in sync.
processor:
  min_pixels: 768
  max_pixels: 2048


prompt:
  system: "You are a coin expert. Identify the year and mint mark from coin images."
  user: |
    Extract two fields from the coin image:
    - year: 4-digit string (e.g. "2024"), or null if not visible.
    - mint_mark: one of "D", "P", "S", "W", "O", "CC", "Mo" if visible,
      otherwise null. Preserve exact casing — "Mo" (not "MO"), "CC" (not "Cc").
      If you see a mark that is NOT in this list (e.g. a foreign coin),
      output null - do not guess one of the 7 values.

    Respond with a single JSON object and nothing else. Use the bare value
    null (not "null", not "") when a field is not visible. Examples:
    {"year": "1999", "mint_mark": "D"}
    {"year": "1961", "mint_mark": null}
    {"year": null, "mint_mark": "D"}