generation:
  max_new_tokens: 128
  temperature: 0.1
  top_p: 1.0
  repetition_penalty: 1.0
  do_sample: false

# Image processor settings for eval/inference. Must match the values used at
# training (config/model/<model>.yaml -> processor) so that visual tokens
# resolve at the same resolution train→eval→inference. Mint mark is a small
# detail — under-resolving here is a primary source of accuracy drop.
processor:
  # Keep identical to model.processor (see config/model/qwen3_vl_8b.yaml).
  # min_pixels upsamples small dataset images so the mint mark stays legible;
  # max_pixels matches the largest native image (~1000x1000).
  min_pixels: 512
  max_pixels: 1280


prompt:
  system: "You are a coin expert. Identify the year and mint mark from coin images."
  user: |
    Look at the coin image and extract:
    1. The year (4-digit number, or empty if none visible)
    2. The mint mark (single letter, e.g. P, D, S, W; or empty if none visible)

    Respond ONLY with valid JSON in this exact schema:
    {"year": "YYYY", "mint_mark": "X"}

    If no mint mark is visible, use an empty string: {"year": "YYYY", "mint_mark": ""}.