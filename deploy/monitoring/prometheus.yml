# Prometheus scrape config for the coin VLM serving API.
#
# The serving app (scripts/serve.py) exposes vllm:* (engine) + coin_* (app)
# metrics at {serving.host}:{serving.port}{serving.metrics.path}. By default
# that is :49710/metrics (see config/serving/serving.yaml).
#
# Target reachability depends on WHERE Prometheus runs:
#   - Docker (this file's default): "host.docker.internal:49710" — inside the
#     container "localhost" is the container itself, so we must reach the HOST.
#     The compose file maps host.docker.internal -> host-gateway (extra_hosts),
#     which resolves to the host on Linux too, hitting serve's published :49710.
#   - Native (run_monitoring.sh): the script rewrites this to "localhost:49710"
#     since the binary runs directly on the serving box.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Resolved relative to this file's directory: /etc/prometheus/ in Docker (the
# compose file mounts alerts.yml next to this config), the .run/ copy natively
# (run_monitoring.sh copies alerts.yml alongside its config copy).
rule_files:
  - alerts.yml

scrape_configs:
  - job_name: coin-vlm-serving
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:49710"]
        labels:
          service: coin-vlm

  # NVIDIA DCGM exporter (GPU util / VRAM / temp / power). Always runs as a
  # Docker container (there is no native binary) publishing host port 49715,
  # so both Docker and native Prometheus reach it through the host.
  - job_name: dcgm
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:49715"]
        labels:
          service: gpu
