# Grafana datasource provisioning: auto-wire the Prometheus started alongside.
#
# The URL must be reachable FROM the Grafana process:
#   - docker-compose: http://prometheus:9090 (compose service name + the port
#     INSIDE the container, which stays 9090 regardless of the host mapping)
#   - native: http://localhost:${PROM_PORT} (default 49713) — run_monitoring.sh
#     rewrites this line, since the native binaries listen on the host ports.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
